name: Sync and scan p4jenkins
on:
  schedule:
    - cron: '0 */2 * * *' # every 30 minutes
  workflow_dispatch: # on button click
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync p4jenking from upstream jenkins github
        uses: tgymnich/fork-sync@v2.0.10
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          owner: jenkinsci
          base: master
          head: master
          repo: p4-plugin
          ignore_fail: false

  scan:
    needs: sync
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout source code
        uses: actions/checkout@v2

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Pre-resolve Maven dependencies and generate dependency tree
        run: |
          mvn dependency:resolve -DskipTests --no-transfer-progress
          mvn dependency:tree \
            -DoutputFile=${{ github.workspace }}/whitesource_mvn_dependency_tree.txt \
            -Dverbose -DoutputType=text \
            --no-transfer-progress

      - name: Login to docker hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Maven 3.9.9
        run: |
          wget -q https://archive.apache.org/dist/maven/maven-3/3.9.15/binaries/apache-maven-3.9.15-bin.tar.gz
          sudo tar -xzf apache-maven-3.9.15-bin.tar.gz -C /opt
          echo "MAVEN_HOME=/opt/apache-maven-3.9.15" >> $GITHUB_ENV
          echo "/opt/apache-maven-3.9.15/bin" >> $GITHUB_PATH

      - name: Debug Docker environment
        run: |
          docker run \
          -v "$HOME/.m2:/root/.m2" \
          -v "/opt/apache-maven-3.9.15:/opt/maven" \
          -v "${{ github.workspace }}:/scan" \
          -e PATH="/opt/maven/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
          perforce/ubuntu22-mend bash -c "
            echo '=== Maven ===' && mvn --version &&
            cd /scan && mvn dependency:tree -DoutputFile=/tmp/test.txt -Dverbose -DoutputType=text -T1 2>&1 | tail -20
          "
          
      - name: Mend scan
        run: |
          docker run \
            -v "${{ github.workspace }}:/scan" \
            -v "$HOME/.m2:/root/.m2" \
            -v "/opt/apache-maven-3.9.15:/opt/maven" \
            -e PATH="/opt/maven/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            perforce/ubuntu22-mend bash -c "java -jar /opt/white-source/wss-unified-agent.jar \
            -noConfig true \
            -d /scan \
            -project p4jenkins-main \
            -apiKey ${{ secrets.MEND_API_KEY }} \
            -userKey ${{ secrets.MEND_USER_KEY }} \
            -product p4jenkins \
            -wss.url https://saas-eu.whitesourcesoftware.com/agent \
            -resolveAllDependencies false \
            -maven.resolveDependencies true \
            -maven.runPreStep false"
